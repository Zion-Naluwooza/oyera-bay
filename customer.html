<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="bootstrap/style.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="reg container-fluid">

        <h3>Customer Registration</h3>
        <div class="container registration-form">
            <form>

                 <div class="mb-3 ">
                    <label for="name" class="form-label">Customer Name:</label>
                    <input type="text" class="form-control" id="name">
                </div>

                <div class="mb-3 ">
                    <label for="exampleInputEmail1" class="form-label">Email address:</label>
                    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">

                </div>

               
                <div class="mb-3 ">
                    <label for="vehicleNumber" class="form-label">Vehicle Number:</label>
                    <input type="text" class="form-control" id="vehicleNumber">
                </div>

                <div class="mb-3 ">
                    <label for="service" class="form-label">Service:</label>
                    <input type="text" class="form-control" id="service">
                </div>

                <div class="mb-3 ">
                    <label for="spare" class="form-label">Spares:</label>
                    <input type="text" class="form-control" id="spare">
                </div>

                <div class="mb-3 ">
                    <label for="assignedTechnician" class="form-label">Assigned Technician:</label>
                    <input type="text" class="form-control" id="assignedTechnician">
                </div>

                <div class="mb-3 ">
                    <label for="technicianRemarks" class="form-label">Technician Remarks:</label>
                    <textarea class="form-control" id="technicianRemarks" rows="5"></textarea>
                </div>

                <a href="dashboard.html"><button type="submit" class="btn">Submit</button></a>
            </form>
        </div>
    </div>
    </div>
    <script src="bootstrap/js.js"></script>

</body>

</html>
